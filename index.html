<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Map - España</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 380px;
            background: white;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .search-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 13px;
        }

        .search-container {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-results {
            position: absolute;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            margin-top: 2px;
            display: none;
            z-index: 1000;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            transition: background-color 0.2s;
        }

        .search-result-item:hover {
            background-color: #f5f5f5;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .btn {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background-color 0.3s;
            white-space: nowrap;
        }

        .btn:hover {
            background-color: #5568d3;
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .tabs-section {
            margin-bottom: 20px;
        }

        .tabs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tabs-header label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }

        .group-buttons {
            display: flex;
            gap: 6px;
        }

        .btn-small {
            padding: 6px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: background-color 0.3s;
            white-space: nowrap;
        }

        .btn-small:hover {
            background-color: #5568d3;
        }

        .btn-delete {
            background: #ff6b6b;
        }

        .btn-delete:hover {
            background-color: #ee5a52;
        }

        .new-group-input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .new-group-input {
            flex: 1;
            min-width: 120px;
            padding: 6px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 11px;
        }

        .new-group-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .parent-group-select {
            min-width: 100px;
            padding: 6px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 10px;
            background: white;
            cursor: pointer;
        }

        .parent-group-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .groups-tree {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 4px 0;
            margin-bottom: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }

        .groups-tree::-webkit-scrollbar {
            width: 6px;
        }

        .groups-tree::-webkit-scrollbar-track {
            background: transparent;
        }

        .groups-tree::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .groups-tree::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .group-node {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
        }

        .group-node:hover {
            background-color: #e8e8ff;
        }

        .group-node.active {
            background-color: #d8d8ff;
            color: #667eea;
            font-weight: 600;
        }

        .group-toggle {
            display: inline-flex;
            width: 16px;
            height: 16px;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .group-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .group-toggle.empty {
            visibility: hidden;
        }

        .group-icon {
            font-size: 12px;
            margin-right: 2px;
            flex-shrink: 0;
        }

        .group-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .group-count {
            font-size: 10px;
            color: #999;
            margin-left: 4px;
        }

        .group-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s;
        }

        .group-content.expanded {
            max-height: 500px;
        }

        .group-indent {
            display: contents;
        }

        .clients-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 12px;
        }

        .clients-list-header h2 {
            font-size: 15px;
            color: #333;
            font-weight: 600;
        }

        .client-count {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .tab-selector {
            font-size: 11px;
            padding: 4px 8px;
            margin-right: 8px;
        }

        .clients-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .client-item {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s;
        }

        .client-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .client-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .project-types {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .project-type {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .project-type input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .project-type label {
            font-size: 11px;
            cursor: pointer;
            color: #555;
        }

        .project-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .project-badge.alpr {
            background-color: #FF6B6B;
        }

        .project-badge.cctv {
            background-color: #4ECDC4;
        }

        .project-badge.cme {
            background-color: #45B7D1;
        }

        .project-badge.residuos {
            background-color: #96CEB4;
        }

        .project-badge.other {
            background-color: #BDBDBD;
        }

        .delete-btn {
            background: #ff6b6b;
            padding: 6px 10px;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }

        .delete-btn:hover {
            background-color: #ee5a52;
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            color: #999;
            font-size: 13px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* Scrollbar styling */
        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                height: 50%;
                bottom: 0;
                border-radius: 12px 12px 0 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map" id="map"></div>
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🗺️ Client Map</h1>
                <p>España</p>
            </div>
            
            <div class="sidebar-content">
                <div class="search-section">
                    <label>Search Town/City</label>
                    <div class="search-container">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Enter town name..."
                        >
                        <button id="addBtn" class="btn" disabled>Add</button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>

                <div id="projectTypesSection" style="display: none; margin-bottom: 15px;">
                    <label style="font-weight: 600; margin-bottom: 8px; color: #333; font-size: 13px; display: block;">Project Types</label>
                    <div class="project-types">
                        <div class="project-type">
                            <input type="checkbox" id="alpr" value="ALPR">
                            <label for="alpr">ALPR</label>
                        </div>
                        <div class="project-type">
                            <input type="checkbox" id="cctv" value="CCTV">
                            <label for="cctv">CCTV</label>
                        </div>
                        <div class="project-type">
                            <input type="checkbox" id="cme" value="CME">
                            <label for="cme">CME</label>
                        </div>
                        <div class="project-type">
                            <input type="checkbox" id="residuos" value="Residuos">
                            <label for="residuos">Residuos</label>
                        </div>
                    </div>
                </div>

                <div class="tabs-section">
                    <div class="tabs-header">
                        <label>📁 Groups</label>
                        <div class="group-buttons">
                            <button class="btn-small" id="newGroupBtn">+ New</button>
                            <button class="btn-small btn-delete" id="deleteGroupBtn">Delete</button>
                        </div>
                    </div>
                    <div id="newGroupInputContainer" class="new-group-input-container" style="display: none;">
                        <input type="text" id="newGroupInput" class="new-group-input" placeholder="Group name...">
                        <select id="parentGroupSelect" class="parent-group-select">
                            <option value="">Root</option>
                        </select>
                        <button class="btn-small" id="saveGroupBtn">Create</button>
                        <button class="btn-small" style="background: #ccc;" id="cancelGroupBtn">Cancel</button>
                    </div>
                    <div class="groups-tree" id="groupsTree"></div>
                </div>

                <div class="clients-list-header">
                    <h2>Clients</h2>
                    <span class="client-count" id="clientCount">0</span>
                </div>
                
                <div class="clients-list" id="clientsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📍</div>
                        <div>No clients added yet</div>
                        <div style="font-size: 11px; margin-top: 5px;">Search and add towns to get started</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/esri-leaflet@3.0.8/dist/esri-leaflet.js"></script>

            { id: 'prov_girona', name: 'Girona', parent: 'cat', children: ['comarca_gironès', 'comarca_la_selva', 'comarca_ripollès', 'comarca_garrotxa', 'comarca_pla_estany', 'comarca_alt_emporda', 'comarca_baix_emporda', 'comarca_cerdanya'] },
            { id: 'comarca_gironès', name: 'Gironès', parent: 'prov_girona', children: [] },
            { id: 'comarca_la_selva', name: 'La Selva', parent: 'prov_girona', children: [] },

            { id: 'comarca_garrotxa', name: 'Garrotxa', parent: 'prov_girona', children: [] },
            { id: 'comarca_pla_estany', name: 'Pla de l\'Estany', parent: 'prov_girona', children: [] },

            { id: 'comarca_segria', name: 'Segrià', parent: 'prov_lleida', children: [] },
            { id: 'comarca_urgell', name: 'Urgell', parent: 'prov_lleida', children: [] },
            { id: 'comarca_pla_urgell', name: 'Pla d\'Urgell', parent: 'prov_lleida', children: [] },
            { id: 'comarca_solsones', name: 'Solsonès', parent: 'prov_lleida', children: [] },
            { id: 'comarca_segarra', name: 'Segarra', parent: 'prov_lleida', children: [] },
            { id: 'comarca_conca_barb', name: 'Conca de Barberà', parent: 'prov_lleida', children: [] },
            { id: 'comarca_noguera', name: 'Noguera', parent: 'prov_lleida', children: [] },

            { id: 'comarca_pallars_sobira', name: 'Pallars Sobirà', parent: 'prov_lleida', children: [] },
            { id: 'comarca_val_aran', name: 'Val d\'Aran', parent: 'prov_lleida', children: [] },
            { id: 'comarca_alt_urgell', name: 'Alt Urgell', parent: 'prov_lleida', children: [] },
            { id: 'comarca_garrigues', name: 'Garrigues', parent: 'prov_lleida', children: [] },
            
            // Tarragona Province
            { id: 'prov_tarragona', name: 'Tarragona', parent: 'cat', children: ['comarca_tarragonès', 'comarca_baix_camp', 'comarca_alt_camp', 'comarca_ribera_ebre', 'comarca_baix_ebre', 'comarca_montsia'] },

            { id: 'comarca_montsia', name: 'Montsià', parent: 'prov_tarragona', children: [] }
        ];
        let activeGroup = 'cat';
        let currentSearchResult = null;
        let markers = {};
        let markerLayer = null;

        // Initialize map
        const map = L.map('map').setView([40.5, -3.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19,
        }).addTo(map);

        markerLayer = L.featureGroup().addTo(map);

        // Project type colors
        const projectColors = {
            'ALPR': '#FF6B6B',
            'CCTV': '#4ECDC4',
            'CME': '#45B7D1',
            'Residuos': '#96CEB4'
        };

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const addBtn = document.getElementById('addBtn');
        const clientsList = document.getElementById('clientsList');
        const clientCount = document.getElementById('clientCount');
        const projectTypesSection = document.getElementById('projectTypesSection');
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');

        // Group management
        const newGroupBtn = document.getElementById('newGroupBtn');
        const deleteGroupBtn = document.getElementById('deleteGroupBtn');
        const newGroupInputContainer = document.getElementById('newGroupInputContainer');
        const newGroupInput = document.getElementById('newGroupInput');
        const parentGroupSelect = document.getElementById('parentGroupSelect');
        const saveGroupBtn = document.getElementById('saveGroupBtn');
        const cancelGroupBtn = document.getElementById('cancelGroupBtn');
        const groupsTree = document.getElementById('groupsTree');

        let expandedGroups = new Set(['cat', 'prov_barcelona', 'prov_girona', 'prov_lleida', 'prov_tarragona']);

        newGroupBtn.addEventListener('click', () => {
            newGroupInputContainer.style.display = 'flex';
            newGroupInput.focus();
            updateParentGroupSelect();
        });

        cancelGroupBtn.addEventListener('click', () => {
            newGroupInputContainer.style.display = 'none';
            newGroupInput.value = '';
        });

        saveGroupBtn.addEventListener('click', createGroup);
        newGroupInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createGroup();
        });

        deleteGroupBtn.addEventListener('click', deleteGroup);

        function updateParentGroupSelect() {
            const options = ['<option value="">Root</option>'];
            groups.forEach(group => {
                options.push(`<option value="${group.id}">${group.name}</option>`);
            });
            parentGroupSelect.innerHTML = options.join('');
        }

        function createGroup() {
            const groupName = newGroupInput.value.trim();
            if (!groupName) return;

            const groupId = 'group_' + Date.now();
            const parentId = parentGroupSelect.value || null;

            const newGroup = {
                id: groupId,
                name: groupName,
                parent: parentId,
                children: []
            };

            groups.push(newGroup);

            // Add to parent's children if parent exists
            if (parentId) {
                const parent = groups.find(g => g.id === parentId);
                if (parent) {
                    parent.children.push(groupId);
                    expandedGroups.add(parentId);
                }
            }

            newGroupInput.value = '';
            newGroupInputContainer.style.display = 'none';
            activeGroup = groupId;
            updateDisplay();
        }

        function deleteGroup() {
            if (activeGroup === 'general') {
                alert('Cannot delete the General group!');
                return;
            }

            const group = groups.find(g => g.id === activeGroup);
            if (!group) return;

            // Move clients from deleted group to General
            clients.forEach(client => {
                if (client.groupId === activeGroup) {
                    client.groupId = 'general';
                }
            });

            // Move child groups to General
            groups.forEach(g => {
                if (g.parent === activeGroup) {
                    g.parent = null;
                }
            });

            // Remove from parent's children
            if (group.parent) {
                const parent = groups.find(g => g.id === group.parent);
                if (parent) {
                    parent.children = parent.children.filter(id => id !== activeGroup);
                }
            }

            groups = groups.filter(g => g.id !== activeGroup);
            expandedGroups.delete(activeGroup);
            activeGroup = 'general';
            updateDisplay();
        }

        function toggleGroup(groupId) {
            if (expandedGroups.has(groupId)) {
                expandedGroups.delete(groupId);
            } else {
                expandedGroups.add(groupId);
            }
            updateGroupsTree();
        }

        function selectGroup(groupId) {
            activeGroup = groupId;
            updateDisplay();
        }

        function editGroupName(groupId) {
            const group = groups.find(g => g.id === groupId);
            if (!group) return;

            const newName = prompt(`Rename "${group.name}":', ${group.name}`);
            if (newName && newName.trim() && newName !== group.name) {
                group.name = newName.trim();
                autoSaveToFirebase();
                updateGroupsTree();
                console.log(`✏️ Renamed group to "${group.name}"`);
            }
        }

        function updateGroupsTree() {
            let html = '';

            function renderGroup(group, level = 0) {
                const isExpanded = expandedGroups.has(group.id);
                const hasChildren = group.children.length > 0;
                const isActive = group.id === activeGroup;
                const indent = level * 16;

                html += `
                    <div class="group-node ${isActive ? 'active' : ''}" style="padding-left: ${indent}px;">
                        <div class="group-toggle ${!hasChildren ? 'empty' : ''} ${!isExpanded ? 'collapsed' : ''}" onmousedown="event.stopPropagation(); toggleGroup('${group.id}')">
                            ${hasChildren ? '▼' : ''}
                        </div>
                        <div class="group-icon">${hasChildren ? '📁' : '📄'}</div>
                        <div class="group-name" onmousedown="event.stopPropagation(); selectGroup('${group.id}')" ondblclick="event.stopPropagation(); editGroupName('${group.id}')">
                            ${group.name}
                        </div>
                        <div class="group-count">${clients.filter(c => c.groupId === group.id).length}</div>
                    </div>
                `;

                if (isExpanded && hasChildren) {
                    group.children.forEach(childId => {
                        const child = groups.find(g => g.id === childId);
                        if (child) renderGroup(child, level + 1);
                    });
                }
            }

            // Render root groups only
            groups.forEach(group => {
                if (!group.parent) {
                    renderGroup(group);
                }
            });

            groupsTree.innerHTML = html;
        }

        let searchTimeout;
        let lastQuery = '';

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                searchResults.classList.remove('active');
                addBtn.disabled = true;
                currentSearchResult = null;
                clearTimeout(searchTimeout);
                return;
            }

            // Debounce search to avoid hammering API
            clearTimeout(searchTimeout);
            searchResults.innerHTML = '<div style="padding: 10px; text-align: center; font-size: 12px; color: #999;">🔍 Searching...</div>';
            searchResults.classList.add('active');

            searchTimeout = setTimeout(() => {
                performSearch(query);
            }, 400);
        });

        function performSearch(query) {
            if (lastQuery === query) return;
            lastQuery = query;

            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', Spain')}&format=json&limit=20&countrycodes=es&accept-language=en`;
            
            fetch(url, { 
                headers: { 'Accept': 'application/json' }
            })
                .then(response => response.json())
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        searchResults.innerHTML = '<div style="padding: 10px; text-align: center; font-size: 12px; color: #999;">No results found</div>';
                        return;
                    }

                    const filtered = data.slice(0, 15);
                    
                    searchResults.innerHTML = filtered
                        .map(result => {
                            const escapedName = result.name.replace(/'/g, "\\'");
                            return `
                                <div class="search-result-item" onclick="selectTown('${escapedName}', ${result.lat}, ${result.lon})">
                                    📍 ${result.name}
                                </div>
                            `;
                        })
                        .join('');
                    searchResults.classList.add('active');
                })
                .catch(error => {
                    console.error('Search error:', error);
                    searchResults.innerHTML = '<div style="padding: 10px; text-align: center; font-size: 12px; color: #f00;">Search failed. Try again.</div>';
                });
        }

        function selectTown(name, lat, lng) {
            currentSearchResult = { name, lat, lng };
            searchInput.value = name;
            searchResults.classList.remove('active');
            addBtn.disabled = false;
            projectTypesSection.style.display = 'block';
            checkboxes.forEach(cb => cb.checked = false);
        }

        addBtn.addEventListener('click', () => {
            if (!currentSearchResult) return;

            const existingClient = clients.find(c => c.name === currentSearchResult.name);
            if (existingClient) {
                alert('This town is already in the client list!');
                return;
            }

            const projectTypes = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.value);

            const client = {
                id: Date.now(),
                name: currentSearchResult.name,
                lat: currentSearchResult.lat,
                lng: currentSearchResult.lng,
                projects: projectTypes,
                groupId: activeGroup
            };

            clients.push(client);
            updateDisplay();
            searchInput.value = '';
            currentSearchResult = null;
            addBtn.disabled = true;
            projectTypesSection.style.display = 'none';
            checkboxes.forEach(cb => cb.checked = false);
        });

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', updateMapMarkers);
        });

        function updateDisplay() {
            updateGroupsTree();
            updateClientsList();
            updateMapMarkers();
        }

        function updateClientsList() {
            const tabClients = clients.filter(c => c.groupId === activeGroup);
            clientCount.textContent = tabClients.length;

            if (tabClients.length === 0) {
                clientsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📍</div>
                        <div>No clients in this group yet</div>
                        <div style="font-size: 11px; margin-top: 5px;">Search and add towns to get started</div>
                    </div>
                `;
                return;
            }

            clientsList.innerHTML = tabClients
                .map(client => `
                    <div class="client-item">
                        <div class="client-name">${client.name}</div>
                        <div style="margin-bottom: 8px;">
                            ${client.projects.length > 0 
                                ? client.projects.map(proj => `<span class="project-badge ${proj.toLowerCase()}">${proj}</span>`).join(' ')
                                : '<span style="color: #ccc; font-size: 11px;">No projects selected</span>'
                            }
                        </div>
                        <div class="project-types">
                            <div class="project-type">
                                <input type="checkbox" data-client-id="${client.id}" value="ALPR" 
                                    ${client.projects.includes('ALPR') ? 'checked' : ''} class="client-checkbox">
                                <label>ALPR</label>
                            </div>
                            <div class="project-type">
                                <input type="checkbox" data-client-id="${client.id}" value="CCTV" 
                                    ${client.projects.includes('CCTV') ? 'checked' : ''} class="client-checkbox">
                                <label>CCTV</label>
                            </div>
                            <div class="project-type">
                                <input type="checkbox" data-client-id="${client.id}" value="CME" 
                                    ${client.projects.includes('CME') ? 'checked' : ''} class="client-checkbox">
                                <label>CME</label>
                            </div>
                            <div class="project-type">
                                <input type="checkbox" data-client-id="${client.id}" value="Residuos" 
                                    ${client.projects.includes('Residuos') ? 'checked' : ''} class="client-checkbox">
                                <label>Residuos</label>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteClient(${client.id})">Remove Client</button>
                    </div>
                `)
                .join('');

            // Add event listeners to client checkboxes
            document.querySelectorAll('.client-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const clientId = parseInt(e.target.dataset.clientId);
                    const projectType = e.target.value;
                    const client = clients.find(c => c.id === clientId);
                    
                    if (e.target.checked) {
                        if (!client.projects.includes(projectType)) {
                            client.projects.push(projectType);
                        }
                    } else {
                        client.projects = client.projects.filter(p => p !== projectType);
                    }
                    
                    updateDisplay();
                });
            });
        }

        function updateMapMarkers() {
            markerLayer.clearLayers();

            const tabClients = clients.filter(c => c.groupId === activeGroup);

            tabClients.forEach(client => {
                if (client.projects.length === 0) {
                    // Gray marker for clients without projects
                    const marker = L.circleMarker([client.lat, client.lng], {
                        radius: 8,
                        fillColor: '#bdbdbd',
                        color: '#999',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    });
                    marker.bindPopup(`<b>${client.name}</b><br>No projects assigned`);
                    markerLayer.addLayer(marker);
                } else {
                    // Create a circle marker for each project type
                    client.projects.forEach((project, index) => {
                        const color = projectColors[project] || '#999';
                        const marker = L.circleMarker([client.lat, client.lng], {
                            radius: 8,
                            fillColor: color,
                            color: color,
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                        
                        const popupText = `
                            <b>${client.name}</b><br>
                            <small>${client.projects.join(', ')}</small>
                        `;
                        marker.bindPopup(popupText);
                        markerLayer.addLayer(marker);
                    });
                }
            });
        }

        function deleteClient(clientId) {
            clients = clients.filter(c => c.id !== clientId);
            updateDisplay();
        }

        // Center map on a client when clicked
        document.addEventListener('click', (e) => {
            if (e.target.closest('.client-item')) {
                const item = e.target.closest('.client-item');
                const clientName = item.querySelector('.client-name').textContent;
                const client = clients.find(c => c.name === clientName);
                if (client) {
                    map.setView([client.lat, client.lng], 12);
                }
            }
        });

        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.remove('active');
            }
        });

        // Initial display
        updateGroupsTree();
        updateClientsList();

        // ========== FIREBASE SYNC ==========
        
        // Load data from Firebase on startup
        async function loadFromFirebase() {
            if (!db) {
                console.warn('Firebase not initialized');
                return;
            }

            try {
                // Load clients
                const clientsSnapshot = await db.collection('clients').get();
                clients = clientsSnapshot.docs.map(doc => ({
                    ...doc.data(),
                    id: parseInt(doc.id) // Convert back to number
                }));

                // Clear and reinitialize groups from hardcoded Catalonia structure
                console.log('📝 Syncing Catalonia groups to Firebase...');
                const groupsSnapshot = await db.collection('groups').get();
                
                // Delete all existing groups
                const batch = db.batch();
                groupsSnapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                
                // Save all default groups
                for (const group of groups) {
                    await db.collection('groups').doc(group.id).set(group);
                }

                console.log('✅ Data loaded from Firebase:', { clients: clients.length, groups: groups.length });
                updateDisplay();
            } catch (error) {
                console.error('Error loading from Firebase:', error);
            }
        }

        // Save clients to Firebase
        async function saveClientsToFirebase() {
            if (!db) return;

            try {
                // Clear existing clients
                const snapshot = await db.collection('clients').get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();

                // Save new clients
                for (const client of clients) {
                    await db.collection('clients').doc(client.id.toString()).set(client);
                }
                console.log('💾 Clients saved to Firebase');
            } catch (error) {
                console.error('Error saving clients:', error);
            }
        }

        // Save groups to Firebase
        async function saveGroupsToFirebase() {
            if (!db) return;

            try {
                // Clear existing groups
                const snapshot = await db.collection('groups').get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();

                // Save new groups
                for (const group of groups) {
                    await db.collection('groups').doc(group.id).set(group);
                }
                console.log('💾 Groups saved to Firebase');
            } catch (error) {
                console.error('Error saving groups:', error);
            }
        }

        // Auto-save function (debounced)
        let saveTimeout;
        function autoSaveToFirebase() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await saveClientsToFirebase();
                await saveGroupsToFirebase();
            }, 1000); // Save 1 second after last change
        }

        // Update display to include Firebase sync
        const originalUpdateDisplay = updateDisplay;
        updateDisplay = function() {
            originalUpdateDisplay();
            if (isFirebaseReady) {
                autoSaveToFirebase();
            }
        };

        // Load Firebase data when page loads
        if (isFirebaseReady) {
            loadFromFirebase();
        }
    </script>
</body>
</html>
