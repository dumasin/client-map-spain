<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Map - España</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 380px;
            background: white;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .search-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 13px;
        }

        .search-container {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #addBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .save-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        #manualSaveBtn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        #manualSaveBtn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.35);
        }

        #manualSaveBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-status {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            min-width: 90px;
        }

        .save-status.saving {
            color: rgba(255, 255, 255, 0.7);
        }

        .save-status.success {
            color: #a8f0c6;
        }

        .save-status.error {
            color: #ff9a9a;
        }

        #searchResults {
            display: none;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }

        #searchResults.active {
            display: block;
        }

        .search-result {
            padding: 10px 12px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result:hover {
            background: #efefef;
        }

        .search-result.selected {
            background: #e8eef7;
            border-bottom: none;
            cursor: default;
        }

        .result-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .result-coords {
            font-size: 11px;
            color: #999;
        }

        .group-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .group-controls button {
            flex: 1;
            padding: 8px 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .group-controls button:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .groups-section-header {
            font-weight: 700;
            font-size: 13px;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #newGroupInputContainer {
            display: none;
            gap: 8px;
            margin-bottom: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        #newGroupInputContainer input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
        }

        #parentGroupSelect {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
        }

        #newGroupInputContainer button {
            padding: 8px 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        #newGroupInputContainer button:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .groups-tree {
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .group-node {
            display: flex;
            align-items: center;
            padding: 6px 0;
            user-select: none;
        }

        .group-toggle {
            width: 20px;
            display: flex;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .group-toggle.empty {
            visibility: hidden;
        }

        .group-icon {
            width: 20px;
            text-align: center;
            font-size: 14px;
        }

        .group-name {
            flex: 1;
            margin-left: 4px;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .group-name:hover {
            background: #f0f0f0;
        }

        .group-node.active .group-name {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .group-count {
            background: #e8eef7;
            color: #667eea;
            font-weight: 600;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        .group-node.active .group-count {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .clients-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 13px;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
            text-transform: uppercase;
        }

        .client-count {
            background: #667eea;
            color: white;
            font-weight: 600;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            min-width: 24px;
            text-align: center;
        }

        .clients-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .client-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            transition: all 0.2s;
        }

        .client-item:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .client-name {
            font-weight: 700;
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
        }

        .project-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: white;
            margin-right: 4px;
        }

        .project-badge.alpr {
            background: #FF6B6B;
        }

        .project-badge.cctv {
            background: #4ECDC4;
        }

        .project-badge.cme {
            background: #45B7D1;
        }

        .project-badge.residuos {
            background: #96CEB4;
        }

        .project-types {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .project-type {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .project-type input {
            cursor: pointer;
        }

        .project-type label {
            font-size: 11px;
            cursor: pointer;
        }

        .delete-btn {
            width: 100%;
            padding: 6px;
            background: #ffebee;
            border: 1px solid #f44336;
            color: #f44336;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #f44336;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        #projectTypesSection {
            display: none;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .project-types label {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map" id="map"></div>
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🗺️ Client Map</h1>
                <p>España</p>
                <p style="font-size: 11px; opacity: 0.8; margin-top: 8px;">v<span id="versionDisplay">1.1.1</span></p>
                <div class="save-bar">
                    <button id="manualSaveBtn">💾 Save</button>
                    <span id="saveStatus" class="save-status"></span>
                </div>
            </div>
            
            <div class="sidebar-content">
                <div class="search-section">
                    <label>Search Town/City</label>
                    <div class="search-container">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Enter town name..."
                        >
                        <button id="addBtn" disabled>Add</button>
                    </div>
                    <div id="searchResults"></div>
                </div>

                <div id="projectTypesSection">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 12px;">Project Types:</label>
                    <div class="project-types">
                        <div class="project-type">
                            <input type="checkbox" id="alprCheck" value="ALPR">
                            <label for="alprCheck">ALPR</label>
                        </div>
                        <div class="project-type">
                            <input type="checkbox" id="cctvCheck" value="CCTV">
                            <label for="cctvCheck">CCTV</label>
                        </div>
                        <div class="project-type">
                            <input type="checkbox" id="cmeCheck" value="CME">
                            <label for="cmeCheck">CME</label>
                        </div>
                        <div class="project-type">
                            <input type="checkbox" id="residuosCheck" value="Residuos">
                            <label for="residuosCheck">Residuos</label>
                        </div>
                    </div>
                </div>

                <div class="groups-section-header">Groups</div>

                <div class="group-controls">
                    <button id="newGroupBtn">➕ New Group</button>
                    <button id="deleteGroupBtn">🗑️ Delete</button>
                </div>

                <div id="newGroupInputContainer">
                    <input type="text" id="newGroupInput" placeholder="New group name...">
                    <select id="parentGroupSelect"></select>
                    <button id="saveGroupBtn">Save</button>
                    <button id="cancelGroupBtn">Cancel</button>
                </div>

                <div class="groups-tree" id="groupsTree"></div>

                <div class="clients-list-header">
                    <h2>Clients</h2>
                    <span class="client-count" id="clientCount">0</span>
                </div>
                
                <div class="clients-list" id="clientsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📍</div>
                        <div>No clients added yet</div>
                        <div style="font-size: 11px; margin-top: 5px;">Search and add towns to get started</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/esri-leaflet@3.0.8/dist/esri-leaflet.js"></script>
    
    <!-- Firebase SDK v9 with compat for inline scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
    
    <!-- Modular Scripts -->
    <script src="js/config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/groups.js"></script>
    <script src="js/search.js"></script>
    <script src="js/services.js"></script>
    <script src="js/map.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
